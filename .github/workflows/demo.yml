name: CI/CD Pipeline

on:
push:
branches:
- main

env:
DOCKER_IMAGE: rishika742/node-app
NODE_VERSION: 18

jobs:
build-test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install Dependencies
    run: npm install

  - name: Run Tests
    run: npm test
```

docker:
runs-on: ubuntu-latest
needs: build-test

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_TOKEN }}

  - name: Build Docker Image
    run: docker build -t rishika742/node-app:latest .

  - name: Push Docker Image
    run: docker push rishika742/node-app:latest
```

deploy:
runs-on: ubuntu-latest
needs: docker

```
steps:
  - name: Deploy to EC2
    uses: appleboy/ssh-action@v0.1.6
    with:
      host: ${{ secrets.SERVER_IP }}
      username: ubuntu
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        docker pull rishika742/node-app:latest
        docker stop node-app || true
        docker rm node-app || true
        docker run -d -p 80:3000 --name node-app rishika742/node-app:latest
```
